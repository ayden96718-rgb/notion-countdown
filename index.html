<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>万能倒计时-OB适配版</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* V21 核心优化：删除 padding，确保在 OB iframe 里不溢出 */
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px; /* 留极小边距防止贴死，拒绝溢出 */
    background: transparent;
    overflow: hidden; /* 禁止出现滚动条 */
  }

  .card {
    background: #fff;
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 4px 6px rgba(0,0,0,0.02), 0 1px 3px rgba(0,0,0,0.05);
    border-radius: 12px;
    padding: 20px 24px 18px;
    width: 100%;
    max-width: 460px;
    /* 确保卡片内容不超出 */
    flex-shrink: 0;
  }

  .title {
    font-family: "华文楷体", "STKaiti", "KaiTi", serif;
    font-size: 14px;
    color: #787774;
    letter-spacing: 0.06em;
    margin-bottom: 18px;
  }
  .red  { color: #e03e3e; }
  .blue { color: #2eaadc; }

  .body {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
  }

  /* 灰块组居中逻辑 */
  .units { 
    display: flex; 
    gap: 8px; 
    flex-shrink: 0; 
    margin-left: auto; 
  }

  .unit  { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .unit-lbl {
    font-size: 11px; color: #787774; letter-spacing: 0.06em;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .flip { position: relative; perspective: 300px; height: 64px; width: 56px; }
  .flip.wide { width: 76px; }
  .half { position: absolute; left: 0; right: 0; height: 32px; overflow: hidden; background: #f7f6f3; }
  .half-top { top: 0; border-radius: 7px 7px 0 0; border-bottom: 1px solid rgba(0,0,0,0.07); }
  .half-bot { bottom: 0; border-radius: 0 0 7px 7px; }
  .half .n {
    position: absolute; width: 100%; height: 64px;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 400; color: #37352f; font-size: 30px; letter-spacing: -0.01em;
  }
  .flip.wide .half .n { font-size: 26px; }
  .half-top .n { top: 0; }
  .half-bot .n { bottom: 0; }

  /* 翻页动画 */
  .flap { position: absolute; left: 0; right: 0; height: 32px; overflow: hidden; background: #f7f6f3; z-index: 3; }
  .flap-top { top: 0; border-radius: 7px 7px 0 0; transform-origin: bottom center; }
  .flap-bot { bottom: 0; border-radius: 0 0 7px 7px; transform-origin: top center; transform: rotateX(90deg); }
  .flap .n {
    position: absolute; width: 100%; height: 64px;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 400; color: #37352f; font-size: 30px; letter-spacing: -0.01em;
  }
  .flip.wide .flap .n { font-size: 26px; }
  .flap-top .n { top: 0; }
  .flap-bot .n { bottom: 0; }
  @keyframes goTop { to   { transform: rotateX(-90deg); } }
  @keyframes goBot { from { transform: rotateX(90deg); } to { transform: rotateX(0deg); } }
  .flap-top.go { animation: goTop 0.22s ease-in forwards; }
  .flap-bot.go { animation: goBot 0.22s ease-out 0.22s forwards; }
  
  /* 右侧周天区域 */
  .right {
    padding-bottom: 2px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end; 
    margin-left: auto;
    margin-right: 0; 
    transform: translateZ(0); 
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .right-main {
    display: flex;
    justify-content: space-between; 
    align-items: flex-end;
    font-family: "Times New Roman", Times, serif;
    font-size: 32px; 
    font-weight: normal; 
    color: #6b6a68; 
    line-height: 0.9;
    transform: skewX(-12deg);
    transform-origin: right center;
  }
  
  .right-main .ltr { font-size: 26px; margin-left: 2px; }

  .right-sub {
    font-size: 13px; color: #9a9896; margin-top: 6px;
    font-family: "Times New Roman", Times, serif;
    white-space: nowrap; text-align: right;
    letter-spacing: 0.02em; margin-right: -0.02em; 
    transform: skewX(-12deg); transform-origin: right center;
  }
</style>
</head>
<body>
<div class="card">
  <div id="title-display" class="title">🎯 距离目标还剩</div>
  <div class="body">
    <div class="units">
      <div class="unit"><div class="flip wide" id="flip-d"><div class="half half-top"><span class="n" id="ht-d">—</span></div><div class="half half-bot"><span class="n" id="hb-d">—</span></div><div class="flap flap-top"><span class="n" id="ft-d">—</span></div><div class="flap flap-bot"><span class="n" id="fb-d">—</span></div></div><div class="unit-lbl">天</div></div>
      <div class="unit"><div class="flip" id="flip-h"><div class="half half-top"><span class="n" id="ht-h">—</span></div><div class="half half-bot"><span class="n" id="hb-h">—</span></div><div class="flap flap-top"><span class="n" id="ft-h">—</span></div><div class="flap flap-bot"><span class="n" id="fb-h">—</span></div></div><div class="unit-lbl">时</div></div>
      <div class="unit"><div class="flip" id="flip-m"><div class="half half-top"><span class="n" id="ht-m">—</span></div><div class="half half-bot"><span class="n" id="hb-m">—</span></div><div class="flap flap-top"><span class="n" id="ft-m">—</span></div><div class="flap flap-bot"><span class="n" id="fb-m">—</span></div></div><div class="unit-lbl">分</div></div>
      <div class="unit"><div class="flip" id="flip-s"><div class="half half-top"><span class="n" id="ht-s">—</span></div><div class="half half-bot"><span class="n" id="hb-s">—</span></div><div class="flap flap-top"><span class="n" id="ft-s">—</span></div><div class="flap flap-bot"><span class="n" id="fb-s">—</span></div></div><div class="unit-lbl">秒</div></div>
    </div>
    <div class="right">
      <div class="right-main" id="weeks-val">—</div>
      <div class="right-sub" id="sub-display">加载中...</div>
    </div>
  </div>
</div>
<script>
  // 1. 解析参数
  const params = new URLSearchParams(window.location.search);
  const dStr = params.get('date') || "2027-03-14";
  const tStr = params.get('time') || "22:00";
  const titleStr = params.get('title') || "2027 年 <span class='red'>3.14</span> <span class='blue'>联考</span>";
  
  const TARGET = new Date(`${dStr}T${tStr}:00+08:00`);
  document.getElementById('title-display').innerHTML = `🎯 距离 ${titleStr} 还剩`;
  document.getElementById('sub-display').textContent = `${dStr.replace(/-/g, '.')} ${tStr}`;

  const prev = {};
  function pad(n) { return String(n).padStart(2, '0'); }
  function doFlip(id, newV) {
    const oldV = prev[id];
    if (oldV === newV) return;
    const ftEl=document.getElementById('ft-'+id), fbEl=document.getElementById('fb-'+id), htEl=document.getElementById('ht-'+id), hbEl=document.getElementById('hb-'+id);
    const ftFlap=ftEl.closest('.flap'), fbFlap=fbEl.closest('.flap');
    htEl.textContent=newV; hbEl.textContent=oldV??newV; ftEl.textContent=oldV??newV; fbEl.textContent=newV;
    ftFlap.classList.remove('go'); fbFlap.classList.remove('go'); void ftFlap.offsetWidth;
    ftFlap.classList.add('go'); fbFlap.classList.add('go');
    setTimeout(()=>{ hbEl.textContent=newV; ftEl.textContent=newV; ftFlap.classList.remove('go'); fbFlap.classList.remove('go'); },520);
    prev[id]=newV;
  }
  function tick() {
    const now = new Date(), diff = TARGET - now;
    if (diff <= 0) { 
        document.getElementById('weeks-val').innerHTML = "<span>目标到达</span>"; 
        return; 
    }
    const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    doFlip('d',String(d)); doFlip('h',pad(h)); doFlip('m',pad(m)); doFlip('s',pad(s));
    
    const w=Math.floor(d/7), rd=d%7;
    const rm=document.getElementById('weeks-val'), rs=document.getElementById('sub-display');
    rm.innerHTML = `<span>${w}<span class="ltr">w</span></span><span>${rd}<span class="ltr">d</span></span>`;
    
    // 强制等宽逻辑
    rm.style.width='auto'; rs.style.width='auto';
    const tw = Math.max(rs.scrollWidth, rm.scrollWidth)+'px';
    rm.style.width=tw; rs.style.width=tw;
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
